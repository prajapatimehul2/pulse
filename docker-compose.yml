services:
  db:
    image: postgres:16-alpine
    container_name: habit_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: habit
      POSTGRES_PASSWORD: habit
      POSTGRES_DB: habit_tracker
    ports:
      # Host port 5434 (5432/5433 are used by other local projects).
      - "5434:5432"
    volumes:
      - habit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habit -d habit_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  habit_pgdata:
