name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build does not connect to the DB; placeholder satisfies env parsing.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          NEXTAUTH_SECRET: build-time-placeholder-secret-value-000000
          NEXTAUTH_URL: http://localhost:3000

  deploy:
    name: Deploy to EC2
    needs: ci
    runs-on: ubuntu-latest
    # Only deploy on direct pushes to main (not PRs).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Push-based deploy: the runner already has the checked-out source, so we
      # rsync it to the box (no deploy key needed for the private repo). The
      # box's .env, node_modules, and .next are preserved via --exclude.
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem

      - name: Rsync source to EC2
        run: |
          rsync -az --delete \
            --exclude node_modules --exclude .next --exclude .git --exclude .env \
            --exclude tsconfig.tsbuildinfo \
            -e "ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/health-habit-tracker/

      - name: Install, migrate, build, reload
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/health-habit-tracker
            npm ci
            npx prisma migrate deploy
            npm run build
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save
